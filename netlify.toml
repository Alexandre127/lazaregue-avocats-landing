[build]
  command = "npm run build"
  publish = "dist"

# Proxy : la page /litige-afp-picrights/ est servie par le microsite Next.js
# hébergé sur Vercel (SEO : l'URL historique est conservée à l'identique).
# IMPORTANT : ces règles doivent rester AVANT le fallback SPA ci-dessous.

# Landing "Formation IA et ChatGPT pour les avocats" (marque Avocat Puissance 10),
# page statique servie par le projet Vercel dédié. URL canonique sur le domaine
# principal pour bénéficier de son autorité SEO.
[[redirects]]
  from = "/formation-ia-avocat/*"
  to = "https://site-avocat-puissance-10.vercel.app/formation-ia-avocat/:splat"
  status = 200
  force = true

# La page (et ses éventuelles sous-routes) proxifiée vers Vercel
[[redirects]]
  from = "/litige-afp-picrights/*"
  to = "https://lazaregue-site-picrights.vercel.app/litige-afp-picrights/:splat"
  status = 200
  force = true

# Page "action collective" (recouvrement abusif) servie par le microsite Vercel
[[redirects]]
  from = "/action-collective/*"
  to = "https://lazaregue-site-picrights.vercel.app/action-collective/:splat"
  status = 200
  force = true

# Page "licence des illustrations" (métadonnées ImageObject) servie par Vercel
[[redirects]]
  from = "/licence-images/*"
  to = "https://lazaregue-site-picrights.vercel.app/licence-images/:splat"
  status = 200
  force = true

# Assets Next.js (CSS/JS, dont les variables de couleur) servis depuis Vercel
[[redirects]]
  from = "/_next/*"
  to = "https://lazaregue-site-picrights.vercel.app/_next/:splat"
  status = 200
  force = true

# Scans de dossiers affichés dans le hero (images statiques du microsite Vercel)
[[redirects]]
  from = "/dossiers/*"
  to = "https://lazaregue-site-picrights.vercel.app/dossiers/:splat"
  status = 200
  force = true

# ============================================================
# CONSOLIDATION PICRIGHTS (juil. 2026)
# Le pilier /picrights/ et le cluster /picrights-afp/ sont supprimés du
# microsite. Une seule page de contenu subsiste : /litige-afp-picrights/.
# L'ORDRE COMPTE : Netlify applique la PREMIÈRE règle qui matche.
# ============================================================

# 1) Le pilier exact → 301 vers la landing (transfert d'autorité).
#    Doit rester AVANT la règle /picrights/* ci-dessous.
[[redirects]]
  from = "/picrights/"
  to = "/litige-afp-picrights/"
  status = 301
  force = true

# 2) Anciennes URLs qui avaient déjà une redirection → 301 vers la landing.
[[redirects]]
  from = "/picrights/picrights-afp/*"
  to = "/litige-afp-picrights/"
  status = 301
  force = true

# 3) Articles des clusters supprimés → 410 Gone (désindexation rapide).
#    SANS ces règles, ces URLs tomberaient sur le fallback SPA `/*` et
#    renverraient HTTP 200 + la coquille du SPA = SOFT 404 (le pire cas SEO).
[[redirects]]
  from = "/picrights/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/picrights-afp/*"
  to = "/index.html"
  status = 410
  force = true

# /afp/ pointait vers le cluster PicRights AFP, désormais supprimé → 301 landing
[[redirects]]
  from = "/afp/*"
  to = "/litige-afp-picrights/"
  status = 301
  force = true

[[redirects]]
  from = "/confidentialite/*"
  to = "https://lazaregue-site-picrights.vercel.app/confidentialite/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/mentions-legales/*"
  to = "https://lazaregue-site-picrights.vercel.app/mentions-legales/:splat"
  status = 200
  force = true

# Sitemap & robots du microsite (URLs en www.lazaregue-avocats.fr) servis
# depuis Vercel — indispensables pour l'indexation Google du cluster SEO.
# À placer AVANT le fallback SPA.
[[redirects]]
  from = "/sitemap.xml"
  to = "https://lazaregue-site-picrights.vercel.app/sitemap.xml"
  status = 200
  force = true

[[redirects]]
  from = "/robots.txt"
  to = "https://lazaregue-site-picrights.vercel.app/robots.txt"
  status = 200
  force = true

# Image Open Graph générée par le microsite (partage social)
[[redirects]]
  from = "/opengraph-image*"
  to = "https://lazaregue-site-picrights.vercel.app/opengraph-image:splat"
  status = 200
  force = true

# ============================================================
# Pages supprimées du microsite (consolidation juil. 2026) → 410 Gone.
# Indispensable : sans règle, elles tomberaient sur le fallback SPA `/*`
# et renverraient HTTP 200 + coquille du SPA = soft 404.
# ============================================================
[[redirects]]
  from = "/copytrack/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/getty-images/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/rights-control/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/jurisprudence/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/cas-pratiques/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/notre-methode/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/a-propos/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/agences/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/reuters/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/ap/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/pa-images/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/maxppp/*"
  to = "/index.html"
  status = 410
  force = true

[[redirects]]
  from = "/paris-match/*"
  to = "/index.html"
  status = 410
  force = true

# SPA fallback - toutes les autres routes redirigent vers index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de sécurité et performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
